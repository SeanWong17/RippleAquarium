<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Fish Tank</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>
      <section class="panel" aria-label="Fish tank controls">
        <div class="playback-controls" aria-label="Simulation playback controls">
          <button id="playback-toggle" class="toggle-button" type="button" aria-pressed="false">
            Pause
          </button>
          <button id="step-frame" type="button" disabled>Step</button>
        </div>

        <label>
          Fish
          <input id="count" type="range" min="1" max="260" step="1" value="60" />
          <output id="count-value">60</output>
        </label>

        <label>
          Perception
          <input id="perception" type="range" min="1.2" max="5.2" step="0.1" value="2.7" />
          <output id="perception-value">2.7</output>
        </label>

        <label>
          Separation
          <input id="separation" type="range" min="0.4" max="3" step="0.1" value="1.35" />
          <output id="separation-value">1.35</output>
        </label>

        <label>
          Avoidance
          <input id="avoidance" type="range" min="2" max="18" step="0.5" value="10" />
          <output id="avoidance-value">10</output>
        </label>

        <label>
          Turn rate
          <input id="turn-rate" type="range" min="0.2" max="20" step="0.1" value="4" />
          <output id="turn-rate-value">4</output>
        </label>

        <label>
          Light
          <input id="light" type="range" min="0.2" max="2.5" step="0.05" value="1.6" />
          <output id="light-value">1.6</output>
        </label>
      </section>

      <section class="panel camera-panel" aria-label="Camera controls">
        <div class="panel-header">
          <button id="copy-camera-json" type="button">Copy JSON</button>
        </div>

        <p id="copy-camera-status" class="copy-status" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
