<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鱼群水波模拟</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>
      <button id="controls-toggle" class="controls-toggle" type="button" aria-expanded="true">
        隐藏参数
      </button>
      <div
        id="model-loading"
        class="model-loading"
        role="status"
        aria-live="polite"
        aria-label="加载鱼模型"
      >
        <span>加载中..</span>
      </div>
      <section id="control-panel" class="panel controls-panel" aria-label="鱼缸控制参数">
        <h2>控制参数</h2>
        <h3>鱼群</h3>
        <div class="playback-controls" aria-label="模拟播放控制" hidden>
          <button id="playback-toggle" class="toggle-button" type="button" aria-pressed="false">
            暂停
          </button>
          <button id="step-frame" type="button" disabled>单步</button>
        </div>

        <label>
          鱼群数量
          <input id="count" type="range" min="1" max="260" step="1" value="60" />
          <output id="count-value">60</output>
        </label>

        <label>
          简化鱼
          <input id="cones" type="range" min="0" max="59" step="1" value="0" />
          <output id="cones-value">0</output>
        </label>

        <label>
          感知范围
          <input id="perception" type="range" min="1.2" max="5.2" step="0.1" value="2.7" />
          <output id="perception-value">2.7</output>
        </label>

        <label>
          分离强度
          <input id="separation" type="range" min="0.4" max="3" step="0.1" value="1.35" />
          <output id="separation-value">1.35</output>
        </label>

        <label>
          避障强度
          <input id="avoidance" type="range" min="2" max="18" step="0.5" value="10" />
          <output id="avoidance-value">10</output>
        </label>

        <label>
          转向速度
          <input id="turn-rate" type="range" min="0.2" max="20" step="0.1" value="4" />
          <output id="turn-rate-value">4</output>
        </label>

        <label>
          顶部回避
          <input id="top-margin" type="range" min="0.2" max="2" step="0.05" value="0.42" />
          <output id="top-margin-value">0.42</output>
        </label>

        <h3>水面</h3>
        <label>
          水波强度
          <input id="water-force" type="range" min="0.02" max="0.2" step="0.005" value="0.085" />
          <output id="water-force-value">0.085</output>
        </label>

        <label>
          波源半径
          <input id="water-radius" type="range" min="0.18" max="0.9" step="0.02" value="0.42" />
          <output id="water-radius-value">0.42</output>
        </label>

        <label>
          波面高度
          <input id="water-height" type="range" min="0.08" max="0.8" step="0.02" value="0.34" />
          <output id="water-height-value">0.34</output>
        </label>

        <label>
          余波持久
          <input id="water-persistence" type="range" min="0.88" max="0.98" step="0.005" value="0.94" />
          <output id="water-persistence-value">0.94</output>
        </label>

        <label>
          触发表层
          <input id="surface-band" type="range" min="0.2" max="1.4" step="0.05" value="0.72" />
          <output id="surface-band-value">0.72</output>
        </label>

        <h3>画面</h3>
        <label>
          珊瑚数量
          <input id="coral-count" type="range" min="0" max="180" step="1" value="90" />
          <output id="coral-count-value">90</output>
        </label>

        <label>
          珊瑚大小
          <input id="coral-scale" type="range" min="0.4" max="1.8" step="0.05" value="1" />
          <output id="coral-scale-value">1</output>
        </label>

        <label>
          光照
          <input id="light" type="range" min="0.2" max="2.5" step="0.05" value="1.6" />
          <output id="light-value">1.6</output>
        </label>
      </section>

      <section class="panel camera-panel" aria-label="相机控制" hidden>
        <div class="panel-header">
          <button id="copy-camera-json" type="button">复制相机参数</button>
        </div>

        <p id="copy-camera-status" class="copy-status" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
